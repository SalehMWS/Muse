name: novaflow

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-novaflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-novaflow}
      POSTGRES_DB: ${POSTGRES_DB:-novaflow}
    ports:
      - "5434:5432"
    volumes:
      - novaflow_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-novaflow} -d ${POSTGRES_DB:-novaflow}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - novaflow_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ..
      dockerfile: deployments/docker/api.Dockerfile
    restart: unless-stopped
    env_file:
      - ../configs/.env
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/app/api", "-healthcheck"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  novaflow_postgres_data:
  novaflow_redis_data:
