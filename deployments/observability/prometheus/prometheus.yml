global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: novaflow-local

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: novaflow-api
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8080"]
        labels:
          service: novaflow-api

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: milvus
    metrics_path: /metrics
    static_configs:
      - targets: ["milvus:9091"]
